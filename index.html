<!DOCTYPE html>
<html>

<head>
  <title>Perceptual Study</title>
  <script src="https://unpkg.com/jspsych@8.2.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-slider-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
  <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    #jspsych-progressbar-container { 
      margin: 4px 0 6px !important;
    }

    #jspsych-progressbar-inner {
      background-color: rgb(0, 196, 0) !important;
    }

    .jspsych-html-slider-response-stimulus { 
      margin-top: 0 !important; 
    }

    .jspsych-html-slider-response-container { 
      margin-top: 6px !important;
    }

    .jspsych-content > *:first-child { 
      margin-top: 0 !important; 
    }
  </style>
</head>

<body></body>

<script>
  const sheetURL = 'https://script.google.com/macros/s/AKfycbx8mwFKl1WHv84QkM4LblyCeo4UOBasZub5rMwazom52bwJ1ydoXuT0Sa4XGC0jLNgvxw/exec';
  const jsPsych = initJsPsych({
    show_progress_bar: true,
    
    on_data_update: function(trialData) {
      let payload = null;
      if(trialData.trial_index == 0 || trialData.trial_index == 1) return;

      if(trialData.trial_index == 2) {
        payload = {
          id: trialData.participant_id,
          response: trialData.response,
          type: 'demographics'
        };
      }

      if(trialData.trial_type === 'html-slider-response') {
        payload = {
          id: trialData.participant_id,
          trial: trialOrder[trialData.trial_index - (timeline.length - videos.length - 1)],
          response: trialData.response,
          type: 'video_trial'
        };
      }

      if(trialData.trial_index == timeline.length - 1) {
        payload = {
          id: trialData.participant_id,
          response: trialData.response,
          type: 'comments'
        };
      }

      fetch(sheetURL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload),
        keepalive: true
      }).catch(err => {
        console.error('Failed to send trial data:', err);
      });
    },

    on_finish: function () {
      document.body.innerHTML = `
        <div style="max-width:700px;margin:40px auto;font-family:system-ui;text-align:center">
          <h2>Saving your responses…</h2>
          <p>Please don't close this tab.</p>
        </div>`;
      const data = jsPsych.data.get().json();
      const payload = {
        d: data,
        type: 'raw_data'
      };
      fetch(sheetURL, {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'text/plain'
        },
        body: JSON.stringify(payload),
        keepalive: true
      }).finally(() => {
        window.location.replace('thankyou.html');
      });
    }
  });

  const participantID = crypto.randomUUID();
  jsPsych.data.addProperties({ participant_id: participantID });

  jsPsych.data.addProperties({
    screen_width:  screen.width,
    screen_height: screen.height,
    window_width:  window.innerWidth,
    window_height: window.innerHeight,
    device_pixel_ratio: window.devicePixelRatio,
    user_agent: navigator.userAgent,
    device: /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
  });

  const timeline = [];

  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <h2>Welcome!</h2>
      <p>This study explores how people perceive the <strong>visual quality of avatars in motion</strong>. The experiment will take about <strong>5 minutes</strong> to complete.</p>
      <p>In each trial, you will see a <strong>degraded avatar on the left</strong> and the <strong>same avatar in its reference (non-degraded) quality on the right</strong>.</p>
      <p>Your task is to give the <strong>degraded avatar</strong> a score from <strong>0 to 100</strong> based on how its visual quality compares to the reference avatar.</p>
      <p>The same avatar and motion appear in multiple trials.</p>
      <p>By continuing, you consent to participate anonymously.</p>
    `,
    choices: ['I Agree']
  });

  timeline.push({
    type: jsPsychSurveyHtmlForm,
    html: `
      <p>Gender:
        <select name="gender" required>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="nonbinary">Non-binary</option>
          <option value="other">Other</option>
        </select>
      </p>
      <p>Age: <input name="age" type="number" min="0" max ="100" required></p>
    `,
    button_label: 'Start'
  });
  
  const videos = [
    'videos/anim_female-3-casual_142897_0.500_knees_poses_0.mp4',
    'videos/anim_female-3-casual_142897_0.500_shake_shoulders_poses_1.mp4',
    'videos/anim_female-3-casual_142897_0.500_walking_01_poses_2.mp4',
    'videos/anim_female-3-casual_85738_0.300_knees_poses_3.mp4',
    'videos/anim_female-3-casual_85738_0.300_shake_shoulders_poses_4.mp4',
    'videos/anim_female-3-casual_85738_0.300_walking_01_poses_5.mp4',
    'videos/anim_male-3-casual_102903_0.500_knees_poses_6.mp4',
    'videos/anim_male-3-casual_102903_0.500_shake_shoulders_poses_7.mp4',
    'videos/anim_male-3-casual_102903_0.500_walking_01_poses_8.mp4',
    'videos/anim_male-3-casual_61742_0.300_knees_poses_9.mp4',
    'videos/anim_male-3-casual_61742_0.300_shake_shoulders_poses_10.mp4',
    'videos/anim_male-3-casual_61742_0.300_walking_01_poses_11.mp4'
  ];

  var preload = {
    type: jsPsychPreload,
    video: videos
  };

  function createVideoTrial(evaluation) {
    let handleKey;
    return {
      type: jsPsychHtmlSliderResponse,
      stimulus: `
        <div style="display: flex; align-items: center; justify-content: center;">
          <div style="display: flex; gap: 12px; align-items: center; justify-content: center;">
            <div>
              <div>
                <video
                  id="evaluationVideo"
                  src="${evaluation}"
                  muted
                  playsinline
                  loop
                  preload="auto"
                  style="max-width: 80vw; max-height: 80vh; width: auto; height: auto; object-fit: contain;"
                ></video>
              </div>
              <div style="display: flex; width: 100%; margin-top: 8px;">
                <div style="width: 50%; text-align: center;">Evaluation Avatar</div>
                <div style="width: 50%; text-align: center;">Reference Avatar</div>
              </div>
            </div>
          </div>
       
          <div id="right-panel" style="margin-left: auto;">
            <p>Compare the avatars and score the quality using the slider.</p>
            <div id="slider-container" style="display: flex;"></div>
            <div id="slider-value" style="font-weight:bold;">Value: 50</div>
            <div id="continue-button"></div>
          </div>
        </div>
      `,
      // labels: ['0', '20', '40', '60', '80', '100'],
      min: 0,
      max: 100,
      start: 50,
      step: 1,
      // slider_width: 20,
      // require_movement: true,
      button_label: 'Continue',

      on_load: () => {
        const evaluationVideo = document.getElementById('evaluationVideo');

        evaluationVideo.currentTime = 0;
        evaluationVideo.loop = true;
        evaluationVideo.play().catch(err => {
          console.error('Video play failed:', err);
        });

        let playing = true;

        const submitBtn = document.querySelector('.jspsych-btn');
      
        handleKey = (e) => {
          // Pause and play videos with spacebar
          // if(e.code === 'Space') {
          //   e.preventDefault();
          //   if(playing) {
          //     evaluationVideo.pause();
          //     referenceVideo.pause();
          //   } else {
          //     evaluationVideo.play();
          //     referenceVideo.play();
          //   }
          //   playing = !playing;
          // }

          if (e.code === 'ArrowUp') {
            e.preventDefault();

            const current = Number(slider.value);
            const step = Number(slider.step) || 1;
            const max = Number(slider.max);

            slider.value = Math.min(current + step, max);
            slider.dispatchEvent(new Event('input', { bubbles: true }));
          }
          
          if (e.code === 'ArrowDown') {
            e.preventDefault();

            const current = Number(slider.value);
            const step = Number(slider.step) || 1;
            const min = Number(slider.min);

            slider.value = Math.max(current - step, min);
            slider.dispatchEvent(new Event('input', { bubbles: true }));
          }

          if(e.code === 'Enter') {
            e.preventDefault();
            if (!submitBtn.disabled) {
              submitBtn.click();
            }
          }
        };

        document.addEventListener('keydown', handleKey);

        const slider = document.querySelector('input[type="range"]');
        const sliderContainer = document.querySelector('#slider-container');
        const continueContainer = document.querySelector('#continue-button');
        const valueDisplay = document.getElementById('slider-value');
        const sliderWrapper = slider.parentElement;
        const panel = document.getElementById('right-panel');

        const sliderRow = document.createElement('div');
        sliderRow.style.display = 'flex';
        sliderRow.style.alignItems = 'center';
        sliderRow.style.gap = '6px';
        sliderRow.style.justifyContent = 'center';

        panel.insertBefore(sliderRow, sliderContainer);
        sliderRow.appendChild(sliderContainer);

        sliderContainer.style.width = '0px';
        sliderContainer.style.height = '500px';
        sliderContainer.style.position = 'relative';
        sliderContainer.style.display = 'inline-block';
        sliderContainer.style.overflow = 'visible';
        sliderContainer.style.margin = '20px';
        sliderContainer.style.padding = '0';

        const rotor = document.createElement('div');
        rotor.style.position = 'absolute';
        rotor.style.left = '50%';
        rotor.style.top = '50%';
        rotor.style.transform = 'translate(-50%, -50%) rotate(-90deg)';
        rotor.style.transformOrigin = 'center center';
        rotor.style.width = '500px';
        rotor.style.height = '30px';
        rotor.style.display = 'flex';
        rotor.style.alignItems = 'center';
        rotor.style.justifyContent = 'center';

        sliderWrapper.style.margin = '0';
        sliderWrapper.style.padding = '0';
        sliderWrapper.style.display = 'flex';
        sliderWrapper.style.alignItems = 'center';
        sliderWrapper.style.justifyContent = 'center';
        rotor.appendChild(sliderWrapper);
        sliderContainer.appendChild(rotor);

        slider.style.width = '500px';
        slider.style.height = '30px';
        slider.style.margin = '0';
        slider.style.padding = '0';
        slider.style.display = 'block';
        slider.style.transform = 'none';

        const tickCol = document.createElement('div');
        tickCol.style.display = 'flex';
        tickCol.style.flexDirection = 'column';
        tickCol.style.justifyContent = 'space-between';
        tickCol.style.height = '500px';
        tickCol.style.marginLeft = '0px';
        tickCol.style.fontSize = '13px';
        tickCol.style.lineHeight = '1.1';
        tickCol.style.userSelect = 'none';
        tickCol.style.webkitUserSelect = 'none';
        tickCol.style.MozUserSelect = 'none';
        tickCol.style.msUserSelect = 'none';  
        tickCol.style.alignItems = 'flex-start';
        tickCol.style.textAlign = 'left';

        tickCol.style.pointerEvents = 'none';
        tickCol.innerHTML = `
          <span>100</span>
          <span>&nbsp;&nbsp;Excellent</span>
          <span>80</span>
          <span>&nbsp;&nbsp;Good</span>
          <span>60</span>
          <span>&nbsp;&nbsp;Fair</span>
          <span>40</span>
          <span>&nbsp;&nbsp;Poor</span>
          <span>20</span>
          <span>&nbsp;&nbsp;Bad</span>
          <span>0</span>
        `;
        sliderRow.appendChild(tickCol);

        continueContainer.append(document.querySelector('.jspsych-btn'));
        
        let sliderMoved = false;
        submitBtn.disabled = true;

        function updateSubmitState() {
          submitBtn.disabled = !sliderMoved;
        }

        slider.addEventListener('input', () => {
          valueDisplay.textContent = `Value: ${slider.value}`;
          sliderMoved = true;
          updateSubmitState();
        });

        let tickRow = document.createElement('div');
        tickRow.style.display = 'flex';
        tickRow.style.justifyContent = 'space-between';
        tickRow.style.textAlign = 'center';
        tickRow.style.width = '500px';
        tickRow.style.fontSize = '14px';
        tickRow.style.marginTop = '4px';
        tickRow.style.flexDirection = 'column';
        tickRow.innerHTML = `
          <span style="flex:1; text-align:center;">Bad</span>
          <span style="flex:1; text-align:center;">Poor</span>
          <span style="flex:1; text-align:center;">Fair</span>
          <span style="flex:1; text-align:center;">Good</span>
          <span style="flex:1; text-align:center;">Excellent</span>
        `;

        // slider.before(tickRow);
      },
      on_finish: () => {
          document.removeEventListener('keydown', handleKey);
      }
    }
  }

  // Test video, same for every experiement
  const firstTrialIndex = 9;

  const remainingIndices = videos
    .map((_, i) => i)
    .filter(i => i !== firstTrialIndex);

  const trialOrder = [
    firstTrialIndex,
    ...jsPsych.randomization.shuffle(remainingIndices)
  ];

  const videoTrials = [];
  for (const i of trialOrder) {
    videoTrials.push(createVideoTrial(videos[i]));
  }

  timeline.unshift(preload);
  timeline.push(...videoTrials);
  timeline.push({
    type: jsPsychSurveyHtmlForm,
    html: `
      <h3>Additional Comments</h3>
      <p>Please share any thoughts or feedback about the experiment:</p>
      <textarea
        name="comments"
        rows="10"
        cols="80"
        placeholder="Type your comments here..."
        style="width: 90%; height: 200px; font-size: 16px;"
      ></textarea>
    `,
    button_label: 'Submit'
  });

  jsPsych.run(timeline);

</script>

</html>
